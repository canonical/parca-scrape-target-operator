name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@74295934ced2f43396ea6573274504d04d4cc635 # v1
    with:
      promotion: ${{ github.event.inputs.promotion }}
    secrets: inherit
