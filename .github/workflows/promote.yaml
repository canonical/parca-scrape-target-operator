name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@e045e1f7012615d9f9bfe0cdbef12ff19c99a114 # v0
    with:
      promotion: ${{ github.event.inputs.promotion }}
    secrets: inherit
