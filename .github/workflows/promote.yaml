name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@4f7694f975b4757d1d09d9c953a12a07fe499a5f # v1
    with:
      promotion: ${{ github.event.inputs.promotion }}
    secrets: inherit
